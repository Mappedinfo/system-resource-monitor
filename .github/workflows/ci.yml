name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Compile Python source
        run: python -m py_compile system_resource_monitor.py

      - name: Run CLI smoke tests
        run: |
          python system_resource_monitor.py --help
          python system_resource_monitor.py --db /tmp/system_resource_monitor_ci.sqlite3 collect
          python system_resource_monitor.py --db /tmp/system_resource_monitor_ci.sqlite3 report --since-hours 1
          python system_resource_monitor.py --db /tmp/system_resource_monitor_ci.sqlite3 watch --samples 1 --no-clear --csv /tmp/system_resource_monitor_watch_ci.csv
          test -s /tmp/system_resource_monitor_watch_ci.csv

      - name: Verify no workload control calls
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          tree = ast.parse(Path("system_resource_monitor.py").read_text())
          forbidden = {"kill", "terminate", "send_signal"}
          failures = []
          for node in ast.walk(tree):
              if isinstance(node, ast.Call):
                  func = node.func
                  name = func.attr if isinstance(func, ast.Attribute) else getattr(func, "id", None)
                  if name in forbidden:
                      failures.append((name, node.lineno))
          if failures:
              raise SystemExit(f"forbidden calls found: {failures}")
          PY

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  package-install:
    name: Wheel install smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel and run CLI
        run: |
          python -m venv /tmp/system-resource-monitor-venv
          /tmp/system-resource-monitor-venv/bin/python -m pip install dist/*.whl
          /tmp/system-resource-monitor-venv/bin/system-resource-monitor --help
          /tmp/system-resource-monitor-venv/bin/system-resource-monitor --db /tmp/system_resource_monitor_wheel.sqlite3 watch --samples 1 --no-clear --csv /tmp/system_resource_monitor_wheel_watch.csv
          test -s /tmp/system_resource_monitor_wheel_watch.csv
